<meta name="theme-color" content="#080b14" />
<title>koulei — Software Engineer & Flutter Expert</title>
<meta name="description" content="Abdulrhman (koulei) — software engineer specializing in Android & Flutter apps." />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
  :root{
    --bg:#080b14;
    --panel:#0f1424;
    --line:#1d2540;
    --ink:#e8ecf5;
    --muted:#8390ab;
    --accent:#5b8dff;       /* navy blue */
    --accent-dim:#2f4a8c;
    --warn:#f0b35b;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--display);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;

  #canvas-bg{position:fixed;inset:0;z-index:0;opacity:.55;pointer-events:none}
  #root{position:relative;z-index:1}
  ::selection{background:var(--accent);color:#06122e}

  .wrap{max-width:920px;margin:0 auto;padding:0 24px}

  /* ---- top status bar ---- */
  .statusbar{
    display:flex;align-items:center;gap:12px;
    font-family:var(--mono);font-size:12px;color:var(--muted);
    padding:18px 0;border-bottom:1px solid var(--line);
    flex-wrap:wrap;

  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .statusbar .sep{margin-left:auto}

  /* ---- hero ---- */
  .hero{padding:84px 0 56px}
  .eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent);margin-bottom:22px}
  h1{font-size:clamp(44px,11vw,104px);line-height:.95;font-weight:700;
    letter-spacing:-.03em}
  h1 .alias{color:var(--accent)}
  .blink{display:inline-block;width:.5em;height:.86em;background:var(--accent);
    margin-left:.06em;transform:translateY(.07em);animation:blink 1.05s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  .lede{margin-top:28px;font-size:clamp(17px,2.4vw,21px);line-height:1.6;
    color:#c4d2cb;max-width:600px}
  .lede b{color:var(--ink);font-weight:600}

  /* ---- reveal animation ---- */
  .reveal{opacity:0;transform:translateY(22px);
    transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none;transition:none}
    .dot,.blink{animation:none}
  }

  /* ---- section header ---- */
  .sec{padding:54px 0}
  .sec-h{font-family:var(--mono);font-size:13px;color:var(--muted);
    letter-spacing:.14em;text-transform:uppercase;margin-bottom:26px;
    display:flex;align-items:center;gap:12px}
  .sec-h::before{content:"";width:18px;height:1px;background:var(--accent-dim)}

  /* ---- about ---- */

  .about p b{color:var(--ink);font-weight:600}

  /* ---- stack chips ---- */

  .chip{font-family:var(--mono);font-size:13px;color:#bcd0c5;
    border:1px solid var(--line);background:var(--panel);
    padding:9px 14px;border-radius:999px;transition:.25s}
  .chip:hover{border-color:var(--accent-dim);color:var(--accent);transform:translateY(-2px)}

  /* ---- links / cards ---- */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  .card{
    display:flex;align-items:center;gap:16px;text-decoration:none;
    border:1px solid var(--line);background:var(--panel);
    padding:20px;border-radius:16px;color:var(--ink);
    transition:transform .25s,border-color .25s,background .25s;
    position:relative;overflow:hidden;cursor:pointer;

  .card .meta{display:flex;flex-direction:column;gap:3px;min-width:0}

  .card .arr{margin-left:auto;color:var(--muted);transition:.25s;flex:0 0 auto}

  footer a{color:var(--muted);text-decoration:none}
  footer a:hover{color:var(--accent)}
</style>

<body>
<canvas id="canvas-bg"></canvas>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ---------- reveal-on-scroll hook ---------- */
function useReveal(){
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const io = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){ el.classList.add('in'); io.unobserve(el); }
    },{threshold:.16});
    io.observe(el);
    // safety net: never let content stay hidden if observer doesn't fire
    const t = setTimeout(()=>el.classList.add('in'), 2600);
    return ()=>{io.disconnect(); clearTimeout(t);};
  },[]);
  return ref;
}
const Reveal = ({children,delay=0,className=""})=>{
  const ref = useReveal();
  return <div ref={ref} className={"reveal "+className} style={{transitionDelay:delay+"ms"}}>{children}</div>;
};

);

const MailIcon = ()=>(

/* ---------- ambient canvas: drifting grid of nodes ---------- */
(function(){
  const c = document.getElementById('canvas-bg');
  const ctx = c.getContext('2d');
  let w,h,dpr,nodes,raf;
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  function size(){
    dpr = Math.min(window.devicePixelRatio||1,2);
    w = c.width = innerWidth*dpr;
    h = c.height = innerHeight*dpr;
    c.style.width = innerWidth+'px';
    c.style.height = innerHeight+'px';
    const count = Math.floor((innerWidth*innerHeight)/26000);
    nodes = Array.from({length:Math.max(28,Math.min(count,90))},()=>({
      x:Math.random()*w, y:Math.random()*h,
      vx:(Math.random()-.5)*.18*dpr, vy:(Math.random()-.5)*.18*dpr
    }));
  }
  function frame(){
    ctx.clearRect(0,0,w,h);
    for(const n of nodes){
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0||n.x>w)n.vx*=-1;
      if(n.y<0||n.y>h)n.vy*=-1;
    }
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
        const max=140*dpr;
        if(d<max){
          ctx.globalAlpha=(1-d/max)*.5;
          ctx.strokeStyle='#2f4a8c';
          ctx.lineWidth=dpr;
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    ctx.globalAlpha=.9;
    for(const n of nodes){
      ctx.fillStyle='#5b8dff';
      ctx.beginPath();ctx.arc(n.x,n.y,1.4*dpr,0,7);ctx.fill();
    }
    ctx.globalAlpha=1;
    raf=requestAnimationFrame(frame);
  }
  size();
  if(reduce){ frame(); cancelAnimationFrame(raf); /* draw one static frame */ }
  else { frame(); }
  addEventListener('resize',()=>{cancelAnimationFrame(raf);size();if(!reduce)frame();});
})();
</script>
